<!DOCTYPE html>
<html class="light scroll-smooth" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Wedding Invitation - Ayisha Sana & Muhammad Midlaj</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        try {
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "primary": "#172e21",      /* Forest Noir */
                            "secondary": "#775a19",    /* Champagne Gold */
                            "background": "#f7f6ed",   /* Clarity Cream */
                        }
                    }
                }
            }
        } catch (_e) {}
    </script>
    <style>
        /* Global Texture Overlay */
        .texture-overlay {
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            opacity: 0.35;
        }

        /* Countdown Number Animation */
        .countdown-num {
            font-family: 'Playfair Display', serif;
            color: #775a19;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.5);
        }

        /* Shimmer Effect on Buttons */
        .shimmer-effect {
            position: relative;
            overflow: hidden;
        }

        .shimmer-effect::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: all 0.6s ease-in-out;
        }

        .shimmer-effect:hover::after {
            left: 100%;
            transition: all 0.6s ease-in-out;
        }

        /* Wind Sway / Breeze Keyframe Animations */
        @keyframes wind-top-left {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-6px, 3px) rotate(-1.5deg); }
            66% { transform: translate(2px, -2px) rotate(0.8deg); }
        }

        @keyframes wind-top-right {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            40% { transform: translate(5px, -4px) rotate(1.2deg); }
            75% { transform: translate(-3px, 1.5px) rotate(-0.8deg); }
        }

        @keyframes wind-bottom-left {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            30% { transform: translate(-4px, 5px) rotate(-1.2deg); }
            70% { transform: translate(3px, -2px) rotate(1deg); }
        }

        @keyframes wind-bottom-right {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            45% { transform: translate(6px, 4px) rotate(1.8deg); }
            80% { transform: translate(-2px, -1.5px) rotate(-0.8deg); }
        }

        /* Couple Sway Animation */
        @keyframes couple-sway {
            0%, 75%, 100% { transform: translate(-50%, 0); }
            80% { transform: translate(-53%, 0); } /* sway left quickly */
            85% { transform: translate(-50%, 0); } /* brief pause in middle */
            90% { transform: translate(-47%, 0); } /* sway right quickly */
            95% { transform: translate(-50%, 0); } /* back to middle */
        }

        /* Apply Animations with Organic Durations and Offsets */
        .anim-top-left {
            animation: wind-top-left 10s ease-in-out infinite;
        }

        .anim-top-right {
            animation: wind-top-right 12s ease-in-out infinite;
        }

        .anim-bottom-left {
            animation: wind-bottom-left 11s ease-in-out infinite;
        }

        .anim-bottom-right {
            animation: wind-bottom-right 9.5s ease-in-out infinite;
        }

        .anim-couple {
            animation: couple-sway 7s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-background text-primary font-body-md overflow-x-hidden min-h-screen flex flex-col relative">

    <!-- Global Paper Texture Overlay -->
    <div class="fixed inset-0 texture-overlay pointer-events-none z-[50]"></div>

    <!-- Main Content Area -->
    <main class="relative flex flex-col items-center justify-center min-h-screen z-10 flex-grow py-12 px-4">
        
        <!-- Elegant Card Container Wrapper -->
        <div class="relative w-full max-w-[550px] bg-[#fdfdfb] p-3 rounded-2xl shadow-[0_20px_50px_rgba(23,46,33,0.12)] border border-[#c5a059]/25 transition-transform duration-700 hover:scale-[1.01] overflow-hidden">
            <!-- Inner border frame -->
            <div class="absolute inset-2 border border-[#172e21]/15 pointer-events-none rounded-xl"></div>
            
            <!-- Inner Relative Container to wrap the image and absolute overlays perfectly -->
            <div class="relative w-full">
                <!-- High-Resolution Invitation Image (with overlays removed) -->
                <img src="invitation_bg.jpg?v=6" alt="Wedding Invitation" class="w-full h-auto rounded-lg select-none block">

                <!-- Bismillah Calligraphy Overlay -->
                <div class="absolute top-[3.5%] left-[50%] w-[32%] -translate-x-1/2 pointer-events-none z-[10]">
                    <img src="bismillah.png?v=6" alt="Bismillah" class="w-full h-auto block select-none">
                </div>

                <!-- Floating Top-Left Leaf -->
                <div class="absolute top-0 left-0 w-[45%] pointer-events-none z-[10] anim-top-left origin-top-left">
                    <img src="top_left_leaf.png?v=6" alt="Leaf Decor" class="w-full h-auto block select-none">
                </div>

                <!-- Floating Top-Right Flowers -->
                <div class="absolute top-0 right-0 w-[52%] pointer-events-none z-[10] anim-top-right origin-top-right">
                    <img src="top_right_flowers.png?v=6" alt="Flower Decor" class="w-full h-auto block select-none">
                </div>

                <!-- Floating Bottom-Left Flowers -->
                <div class="absolute bottom-0 left-0 w-[45%] pointer-events-none z-[10] anim-bottom-left origin-bottom-left">
                    <img src="bottom_left_flowers.png?v=6" alt="Flower Decor" class="w-full h-auto block select-none">
                </div>

                <!-- Floating Bottom-Right Leaf -->
                <div class="absolute bottom-0 right-0 w-[50%] pointer-events-none z-[10] anim-bottom-right origin-bottom-right">
                    <img src="bottom_right_leaf.png?v=6" alt="Leaf Decor" class="w-full h-auto block select-none">
                </div>

                <!-- Floating Couple Overlay at the bottom center -->
                <div class="absolute bottom-0 left-[50%] w-[36%] pointer-events-none z-[10] anim-couple origin-bottom">
                    <img src="couple.png?v=6" alt="Bride and Groom" class="w-full h-auto block select-none">
                </div>
            </div>
        </div>

        <!-- Rich Interactive Countdown Section -->
        <div id="countdown-container" class="mt-10 mb-6 flex flex-col items-center w-full max-w-[500px] z-20">
            <h3 class="font-serif italic text-sm tracking-[0.2em] uppercase text-primary/80 mb-4">
                Days until the celebration
            </h3>
            
            <div class="flex items-center justify-center gap-4 sm:gap-6">
                <!-- Days -->
                <div class="flex flex-col items-center justify-center bg-[#fdfdfb]/80 border border-[#c5a059]/20 w-16 h-20 sm:w-20 sm:h-24 rounded-2xl shadow-sm backdrop-blur-[2px]">
                    <span id="days" class="countdown-num text-3xl sm:text-4xl font-bold">00</span>
                    <span class="text-[9px] sm:text-[10px] tracking-[0.2em] uppercase text-primary/60 font-medium mt-1">Days</span>
                </div>
                
                <span class="text-secondary font-serif text-xl mb-6">:</span>

                <!-- Hours -->
                <div class="flex flex-col items-center justify-center bg-[#fdfdfb]/80 border border-[#c5a059]/20 w-16 h-20 sm:w-20 sm:h-24 rounded-2xl shadow-sm backdrop-blur-[2px]">
                    <span id="hours" class="countdown-num text-3xl sm:text-4xl font-bold">00</span>
                    <span class="text-[9px] sm:text-[10px] tracking-[0.2em] uppercase text-primary/60 font-medium mt-1">Hours</span>
                </div>

                <span class="text-secondary font-serif text-xl mb-6">:</span>

                <!-- Minutes -->
                <div class="flex flex-col items-center justify-center bg-[#fdfdfb]/80 border border-[#c5a059]/20 w-16 h-20 sm:w-20 sm:h-24 rounded-2xl shadow-sm backdrop-blur-[2px]">
                    <span id="minutes" class="countdown-num text-3xl sm:text-4xl font-bold">00</span>
                    <span class="text-[9px] sm:text-[10px] tracking-[0.2em] uppercase text-primary/60 font-medium mt-1">Mins</span>
                </div>

                <span class="text-secondary font-serif text-xl mb-6">:</span>

                <!-- Seconds -->
                <div class="flex flex-col items-center justify-center bg-[#fdfdfb]/80 border border-[#c5a059]/20 w-16 h-20 sm:w-20 sm:h-24 rounded-2xl shadow-sm backdrop-blur-[2px]">
                    <span id="seconds" class="countdown-num text-3xl sm:text-4xl font-bold">00</span>
                    <span class="text-[9px] sm:text-[10px] tracking-[0.2em] uppercase text-primary/60 font-medium mt-1">Secs</span>
                </div>
            </div>
        </div>

        <!-- Action Button -->
        <div class="mt-4 mb-8 flex flex-col items-center gap-6 w-full max-w-[550px] z-20">
            <button id="btn-location" class="shimmer-effect bg-[#2d4436] text-white px-12 py-4 rounded-full font-semibold text-xs uppercase tracking-[0.25em] shadow-md hover:bg-[#1b2b22] transition-all duration-500 hover:scale-[1.05] active:scale-95 group flex items-center gap-3" onclick="window.open('https://www.google.com/maps/place/Rio+Convention+Centre/@11.0820685,76.12288,906m/data=!3m2!1e3!4b1!4m6!3m5!1s0x3ba6358647ddd7af:0xd82ab11ac2d9a544!8m2!3d11.0820685!4d76.1254549!16s%2Fg%2F11fn7kg651?entry=ttu&g_ep=EgoyMDI2MDcxMy4wIKXMDSoASAFQAw%3D%3D', '_blank')">
                <span>View Location</span>
                <span class="material-symbols-outlined text-[18px] transition-transform group-hover:translate-x-1">map</span>
            </button>
            <div class="flex flex-col items-center gap-2">
                <p class="font-medium text-[10px] tracking-[0.3em] uppercase text-primary/50">
                    RSVP by July 26th
                </p>
                <div class="h-[1px] w-12 bg-primary/20"></div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="w-full py-6 bg-transparent relative z-10 text-center text-xs text-primary/40 tracking-wider">
        <p>&copy; 2026 Ayisha & Midlaj. All rights reserved.</p>
    </footer>

    <!-- Countdown Timer Script -->
    <script>
        // Target date: August 9, 2026 at 11:00 AM (local time)
        const targetDate = new Date('August 9, 2026 11:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                document.getElementById('countdown-container').innerHTML = `
                    <div class="bg-[#fdfdfb]/90 border border-[#c5a059]/20 px-8 py-4 rounded-2xl shadow-sm backdrop-blur-[2px] text-center">
                        <p class="text-[#775a19] text-base font-serif italic tracking-widest uppercase">The Wedding Day is Today!</p>
                    </div>
                `;
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = String(days).padStart(2, '0');
            document.getElementById('hours').innerText = String(hours).padStart(2, '0');
            document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
            document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
